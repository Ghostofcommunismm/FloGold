<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>萤火虫风 · 示例 2 - 浅色活力版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #f0f7d8 0%, #fffce8 50%, #fff5e0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0d1f00;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    :root {
      --firefly: #C8FF00;
      --firefly-deep: #8FB800;
      --orange: #FF6B35;
      --pink: #FF4081;
      --bg: #ffffff;
      --bg-soft: #f7fae8;
      --line: rgba(0,0,0,0.08);
      --text-2: rgba(13,31,0,0.6);
      --text-3: rgba(13,31,0,0.4);
    }

    .phone {
      width: 390px;
      height: 844px;
      border-radius: 48px;
      background: var(--bg);
      box-shadow:
        0 0 0 12px #f0f0e8,
        0 0 0 14px #e5e5d8,
        0 50px 100px rgba(143, 184, 0, 0.25),
        0 0 80px rgba(255, 107, 53, 0.1);
      overflow: hidden;
      position: relative;
    }

    /* 顶部装饰大球 */
    .deco-orb {
      position: absolute;
      width: 280px; height: 280px;
      border-radius: 50%;
      top: -80px; right: -60px;
      background: radial-gradient(circle at 30% 30%, var(--firefly) 0%, #e8ff66 40%, #fff9b8 70%, transparent 100%);
      filter: blur(0);
      opacity: 0.85;
      z-index: 0;
    }
    .deco-orb-2 {
      position: absolute;
      width: 140px; height: 140px;
      border-radius: 50%;
      top: 380px; left: -50px;
      background: radial-gradient(circle at 40% 40%, var(--orange) 0%, #ffb38a 50%, transparent 100%);
      opacity: 0.4;
      z-index: 0;
      filter: blur(2px);
    }

    .statusbar {
      position: relative;
      z-index: 2;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      font-size: 15px;
      font-weight: 600;
      color: #0d1f00;
    }
    .statusbar .right { display: flex; gap: 6px; align-items: center; }
    .statusbar svg { width: 18px; height: 18px; }

    .header {
      position: relative;
      z-index: 2;
      padding: 8px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header .brand {
      display: flex; align-items: center; gap: 8px;
    }
    .header .logo {
      width: 32px; height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--firefly), var(--firefly-deep));
      display: flex; align-items: center; justify-content: center;
      font-weight: 800;
      color: #0d1f00;
      font-size: 18px;
      box-shadow: 0 4px 12px rgba(143,184,0,0.4);
    }
    .header .brand-name {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.5px;
      color: #0d1f00;
    }
    .header .notify {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--bg-soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      position: relative;
    }
    .header .notify::after {
      content: '';
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--orange);
      top: 6px; right: 6px;
    }

    /* 余额卡片 */
    .balance-card {
      position: relative;
      z-index: 2;
      margin: 8px 20px 24px;
      padding: 28px 24px;
      border-radius: 32px;
      background: linear-gradient(135deg, #0d1f00 0%, #1a3300 50%, #0d1f00 100%);
      color: #fff;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(13, 31, 0, 0.2);
    }
    .balance-card::before {
      content: '';
      position: absolute;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: var(--firefly);
      filter: blur(50px);
      opacity: 0.35;
      top: -80px; right: -80px;
    }
    .balance-card::after {
      content: '';
      position: absolute;
      width: 4px; height: 32px;
      background: var(--firefly);
      top: 28px; right: 24px;
      border-radius: 2px;
    }
    .balance-card .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }
    .balance-card .label {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
    }
    .balance-card .badge {
      background: rgba(200,255,0,0.2);
      color: var(--firefly);
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .balance-card .amount {
      font-family: 'JetBrains Mono', monospace;
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -2px;
      margin: 16px 0 4px;
      line-height: 1;
      position: relative;
    }
    .balance-card .amount .currency {
      font-size: 22px;
      color: var(--firefly);
      margin-right: 8px;
      vertical-align: top;
      line-height: 1.7;
    }
    .balance-card .trend {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      position: relative;
    }
    .balance-card .trend .up { color: var(--firefly); font-weight: 600; }
    .balance-card .footer {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      position: relative;
    }
    .balance-card .stat {
      padding: 12px 14px;
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      backdrop-filter: blur(10px);
    }
    .balance-card .stat .v {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }
    .balance-card .stat .v.income { color: var(--firefly); }
    .balance-card .stat .v.expense { color: #ff8c8c; }
    .balance-card .stat .k {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* 圆环进度 */
    .progress-section {
      position: relative;
      z-index: 2;
      padding: 0 20px;
      margin-bottom: 20px;
    }
    .progress-card {
      background: var(--bg-soft);
      border-radius: 24px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .ring {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: conic-gradient(var(--firefly) 0 65%, rgba(0,0,0,0.08) 65% 100%);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .ring::before {
      content: '';
      position: absolute;
      inset: 6px;
      background: var(--bg-soft);
      border-radius: 50%;
    }
    .ring span {
      position: relative;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: #0d1f00;
    }
    .progress-card .text {
      flex: 1;
    }
    .progress-card .text .t {
      font-size: 14px;
      font-weight: 700;
      color: #0d1f00;
    }
    .progress-card .text .s {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 2px;
    }

    /* 流水 */
    .section-title {
      position: relative;
      z-index: 2;
      padding: 0 24px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #0d1f00;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-title .more {
      font-size: 11px;
      color: var(--text-3);
      font-weight: 500;
      letter-spacing: 0;
    }
    .list {
      position: relative;
      z-index: 2;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tx-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    .tx-item .ico {
      width: 44px; height: 44px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .ico.food { background: linear-gradient(135deg, #fff3e0, #ffd9b3); }
    .ico.transport { background: linear-gradient(135deg, #e3f2fd, #b3d9ff); }
    .ico.shop { background: linear-gradient(135deg, #fce4ec, #ffb8d1); }
    .ico.salary { background: linear-gradient(135deg, var(--firefly), #e8ff66); }
    .tx-item .meta { flex: 1; min-width: 0; }
    .tx-item .name {
      font-size: 14px;
      font-weight: 700;
      color: #0d1f00;
    }
    .tx-item .sub {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }
    .tx-item .val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 700;
    }
    .val.expense { color: #0d1f00; }
    .val.income { color: var(--firefly-deep); }

    /* Tab */
    .tabbar {
      position: absolute;
      bottom: 16px; left: 16px; right: 16px;
      height: 64px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 24px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      padding: 0 8px;
      box-shadow: 0 -8px 24px rgba(0,0,0,0.06);
      z-index: 3;
    }
    .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-3);
      font-size: 10px;
      font-weight: 600;
    }
    .tab.active {
      color: #0d1f00;
    }
    .tab.active .ic {
      background: var(--firefly);
      color: #0d1f00;
    }
    .tab .ic {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: all .2s;
    }
    .tab.center {
      position: relative;
    }
    .tab.center .ic {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--firefly);
      color: #0d1f00;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin-top: -22px;
      box-shadow: 0 8px 24px rgba(143,184,0,0.5);
      font-weight: 700;
    }
    .tab.center span { display: none; }

    .home-indicator {
      position: absolute;
      bottom: 6px; left: 50%;
      transform: translateX(-50%);
      width: 134px; height: 5px;
      background: rgba(13,31,0,0.4);
      border-radius: 3px;
      z-index: 4;
    }

    .doc-title {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      color: rgba(13,31,0,0.5);
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="doc-title">示例 02 · 浅色活力版</div>
  <div class="phone">
    <div class="deco-orb"></div>
    <div class="deco-orb-2"></div>

    <div class="statusbar">
      <span>9:41</span>
      <div class="right">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 22h2v-8H2v8zm5 0h2V10H7v12zm5 0h2V6h-2v16zm5 0h2V2h-2v20z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="7" width="18" height="10" rx="2"/></svg>
      </div>
    </div>

    <div class="header">
      <div class="brand">
        <div class="logo">F</div>
        <div class="brand-name">轻记账</div>
      </div>
      <div class="notify">🔔</div>
    </div>

    <div class="balance-card">
      <div class="row">
        <div class="label">本月结余</div>
        <div class="badge">★ PRO</div>
      </div>
      <div class="amount"><span class="currency">¥</span>4,653</div>
      <div class="trend">较上月 <span class="up">+12.4% ↑</span></div>
      <div class="footer">
        <div class="stat">
          <div class="v income">+¥8,200</div>
          <div class="k">收入</div>
        </div>
        <div class="stat">
          <div class="v expense">-¥3,547</div>
          <div class="k">支出</div>
        </div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-card">
        <div class="ring"><span>65%</span></div>
        <div class="text">
          <div class="t">本月预算剩余 ¥1,453</div>
          <div class="s">还剩 8 天 · 别超支啦 ⚡</div>
        </div>
      </div>
    </div>

    <div class="section-title">最近交易 <span class="more">查看全部 →</span></div>
    <div class="list">
      <div class="tx-item">
        <div class="ico salary">💼</div>
        <div class="meta">
          <div class="name">工资入账</div>
          <div class="sub">今天 09:12 · 招商银行</div>
        </div>
        <div class="val income">+¥8,200</div>
      </div>
      <div class="tx-item">
        <div class="ico food">🍜</div>
        <div class="meta">
          <div class="name">海底捞火锅</div>
          <div class="sub">今天 19:30 · 餐饮</div>
        </div>
        <div class="val expense">-¥268</div>
      </div>
      <div class="tx-item">
        <div class="ico shop">🛍️</div>
        <div class="meta">
          <div class="name">UNIQLO</div>
          <div class="sub">昨天 14:22 · 购物</div>
        </div>
        <div class="val expense">-¥399</div>
      </div>
    </div>

    <div class="tabbar">
      <div class="tab active">
        <div class="ic">🏠</div>
        <div>首页</div>
      </div>
      <div class="tab">
        <div class="ic">📋</div>
        <div>账单</div>
      </div>
      <div class="tab center">
        <div class="ic">＋</div>
        <span>记一笔</span>
      </div>
      <div class="tab">
        <div class="ic">📈</div>
        <div>分析</div>
      </div>
      <div class="tab">
        <div class="ic">👤</div>
        <div>我的</div>
      </div>
    </div>

    <div class="home-indicator"></div>
  </div>
</body>
</html>
