<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>方案 B · 极简股票风格 — 记一笔</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f5f0;
      --card: #ffffff;
      --ink: #14110c;
      --ink-2: #4a463e;
      --ink-3: #9a948a;
      --line: rgba(20, 17, 12, 0.06);
      --line-2: rgba(20, 17, 12, 0.12);

      /* —— 中国股市：涨红跌绿 —— */
      --up: #e54545;
      --up-bg: #fde8e8;
      --up-soft: rgba(229, 69, 69, 0.08);
      --down: #22a06b;
      --down-bg: #e6f5ed;
      --down-soft: rgba(34, 160, 107, 0.08);

      --gold: #d4a574;
      --gold-soft: #faf3e8;

      --shadow-sm: 0 1px 2px rgba(20, 17, 12, 0.04), 0 2px 6px rgba(20, 17, 12, 0.03);
      --shadow-md: 0 4px 12px rgba(20, 17, 12, 0.06);
      --shadow-lg: 0 24px 60px rgba(20, 17, 12, 0.18);

      --sans: 'Outfit', 'Noto Sans SC', system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 36px 16px 80px;
      -webkit-font-smoothing: antialiased;
    }
    .page-title {
      text-align: center;
      margin-bottom: 36px;
    }
    .page-title h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .page-title h1 span { color: var(--up); font-weight: 800; }
    .page-title p {
      font-size: 12.5px;
      color: var(--ink-3);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    /* ============ 手机 ============ */
    .phone {
      max-width: 400px;
      width: 100%;
      margin: 0 auto;
      aspect-ratio: 9 / 19.5;
      background: #0a0a0a;
      border-radius: 44px;
      padding: 12px;
      box-shadow: 0 36px 80px rgba(0,0,0,0.32), 0 16px 32px rgba(0,0,0,0.18);
      position: relative;
    }
    .phone::before {
      content: '';
      position: absolute;
      top: 22px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 30px;
      background: #0a0a0a;
      border-radius: 99px;
      z-index: 20;
    }
    .phone-screen {
      width: 100%; height: 100%;
      background: var(--bg);
      border-radius: 32px;
      overflow: hidden;
      position: relative;
    }

    .scheme-tag {
      position: absolute;
      top: 18px; right: 18px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 6px 12px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      z-index: 30;
      box-shadow: var(--shadow-sm);
    }
    .scheme-tag .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--up);
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ============ Sheet ============ */
    .modal-sheet {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      animation: slideIn 0.45s cubic-bezier(0.32, 0.72, 0, 1);
    }
    @keyframes slideIn {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    /* ============ Ticker 头部 ============ */
    .ticker {
      padding: 50px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ticker-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .ticker-symbol {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--ink-3);
      font-weight: 600;
    }
    .ticker-symbol .pulse-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--up);
      animation: pulse 1.4s infinite;
    }
    .ticker-actions {
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(20, 17, 12, 0.04);
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--ink-2);
    }
    .icon-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    .ticker-price {
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-family: var(--mono);
    }
    .ticker-price .cur {
      font-size: 28px;
      color: var(--ink-2);
      font-weight: 400;
    }
    .ticker-price .price {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--up);
      line-height: 1;
      font-feature-settings: 'tnum';
      position: relative;
    }
    .ticker-price .cursor {
      display: inline-block;
      width: 2px; height: 44px;
      background: var(--up);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1.2s infinite;
    }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

    .ticker-stats {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-top: 8px;
      font-family: var(--mono);
    }
    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--up-bg);
      color: var(--up);
      font-size: 12px;
      font-weight: 600;
    }
    .stat-text {
      font-size: 12px;
      color: var(--ink-2);
      font-weight: 500;
    }

    /* ============ 迷你图表条 ============ */
    .mini-chart {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 28px;
      padding: 0 4px;
    }
    .mini-bar {
      flex: 1;
      background: var(--up);
      opacity: 0.6;
      border-radius: 1px;
      transition: opacity 0.2s;
    }
    .mini-bar.dim { opacity: 0.25; }

    /* ============ 类型切换（segmented pill）============ */
    .type-seg {
      display: flex;
      margin: 14px 20px 0;
      background: rgba(20, 17, 12, 0.04);
      border-radius: 12px;
      padding: 3px;
      position: relative;
    }
    .type-seg button {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-3);
      cursor: pointer;
      border-radius: 9px;
      font-family: var(--sans);
      transition: color 0.2s;
      position: relative;
      z-index: 1;
    }
    .type-seg button.active {
      color: #fff;
    }
    .type-seg .seg-pill {
      position: absolute;
      top: 3px; bottom: 3px;
      width: calc(50% - 3px);
      border-radius: 9px;
      transition: all 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .type-seg .seg-pill.exp { left: 3px; background: var(--up); }
    .type-seg .seg-pill.inc { left: calc(50%); background: var(--down); }

    /* ============ 分类 · 6列紧凑 ============ */
    .cat-section {
      padding: 18px 20px 8px;
    }
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }
    .cat-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border: none;
      background: transparent;
      border-radius: 10px;
      cursor: pointer;
      padding: 4px 0;
      transition: all 0.2s;
      position: relative;
    }
    .cat-cell .ic {
      width: 32px; height: 32px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      color: var(--ink-2);
      border: 1px solid var(--line);
      transition: all 0.25s;
    }
    .cat-cell .ic svg { width: 16px; height: 16px; stroke-width: 2; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }
    .cat-cell .lb {
      font-size: 10.5px;
      color: var(--ink-2);
      font-weight: 500;
      letter-spacing: 0;
    }
    .cat-cell.active {
      background: var(--up-soft);
    }
    .cat-cell.active .ic {
      background: var(--up);
      color: #fff;
      border-color: var(--up);
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(229, 69, 69, 0.25);
    }
    .cat-cell.active .lb { color: var(--up); font-weight: 600; }

    /* ============ 信息行 · 极简key:value ============ */
    .info-list {
      margin: 12px 16px 0;
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .ir-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-2);
      flex-shrink: 0;
    }
    .info-row .ir-icon svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
    .info-row .ir-label {
      font-size: 13px;
      color: var(--ink-2);
      font-weight: 500;
      flex: 1;
    }
    .info-row .ir-value {
      font-size: 13px;
      color: var(--ink);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .info-row .ir-value.empty { color: var(--ink-3); font-weight: 400; }
    .info-row .ir-arrow {
      width: 14px; height: 14px;
      stroke: var(--ink-3);
      fill: none; stroke-width: 2;
    }
    .info-row .ir-badge {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--gold-2);
      font-weight: 600;
    }

    /* ============ 数字键盘 ============ */
    .keypad {
      margin-top: auto;
      background: var(--card);
      padding: 12px 12px 18px;
      border-top: 1px solid var(--line);
      flex-shrink: 0;
    }
    .keypad-shortcut {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .keypad-shortcut button {
      flex: 1;
      padding: 8px 0;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 11.5px;
      color: var(--ink-2);
      font-weight: 500;
      cursor: pointer;
      font-family: var(--sans);
      min-width: 50px;
    }
    .keypad-shortcut button.active {
      background: var(--up-bg);
      color: var(--up);
      border-color: rgba(229, 69, 69, 0.2);
      font-weight: 600;
    }
    .key-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .key {
      aspect-ratio: 1.8 / 1;
      background: var(--bg);
      border: none;
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
      color: var(--ink);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .key:active {
      background: var(--up-bg);
      transform: scale(0.96);
    }
    .key.fn {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-2);
      background: rgba(20, 17, 12, 0.04);
    }
    .key.fn svg {
      width: 18px; height: 18px;
      stroke: currentColor; fill: none; stroke-width: 2;
    }
    .key.go {
      grid-row: span 2;
      background: var(--up);
      color: #fff;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(229, 69, 69, 0.35);
      aspect-ratio: 1 / 2.8;
    }
    .key.go:active { transform: scale(0.96); }
    .key.go.inc {
      background: var(--down);
      box-shadow: 0 4px 14px rgba(34, 160, 107, 0.35);
    }
  </style>
</head>
<body>
  <div class="page-title">
    <h1>方案 B · <span>股票行情风格</span></h1>
    <p>参考雪球 / Robinhood / 富途 — 大字号 ticker + 紧凑6列 + 极简信息行</p>
  </div>

  <div class="phone">
    <div class="phone-screen">
      <div class="scheme-tag"><span class="dot"></span>方案 B · Ticker</div>

      <div class="modal-sheet">
        <!-- Ticker 头部 -->
        <div class="ticker">

        <!-- 分类 · 6列 -->

            <button class="cat-cell">

            <button class="cat-cell">

          <div class="key-grid">
